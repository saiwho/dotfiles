- defaults:
    link:
      relink: true
      force: true

- clean: ['~']

- link:
    ~/:
      glob: true
      path: aspell/*
      path: bash/*
      path: env/*
      path: git/*
      path: misc-cli/*
      path: tmux/*
      path: vim/*
      path: zsh/zprezto/*
      prefix: '.'
    
    ~/.config/fish:
      glob: true
      create: true
      path: fish/*
    
    ~/.config/bat/config:
      create: true
      path: misc-cli/bat/config

    ~/.bin/*:
      glob: true
      create: true
      path: scripts/bin/*
    
    ~/.config/kitty/kitty.conf:
      glob: true
      create: true
      path: terminal/kitty/kitty.conf
    
    ~/.p10k.zsh:
      path: zsh/p10k.zsh

- shell:
  - [git submodule update --init --recursive, Installing submodules]
