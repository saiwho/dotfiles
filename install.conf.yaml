- defaults:
    link:
      relink: true
      force: true

- clean: ['~']

- link:
    ~/:
      glob: true
      path: aspell/*
      path: bash/*
      path: env/*
      path: git/*
      prefix: '.'
    
    ~/.config/fish:
      glob: true
      create: true
      path: fish/*
    
- shell:
  - [git submodule update --init --recursive, Installing submodules]
