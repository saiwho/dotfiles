- defaults:
    link:
      relink: true
      force: true

- clean: ['~']

- link:
    ~/:
      glob: true
      path: aspell/*
      path: bash/*
      path: env/*
      path: git/*
      path: misc-cli/*
      prefix: '.'
    
    ~/.config/fish:
      glob: true
      create: true
      path: fish/*
    
    ~/.config/bat/config:
      create: true
      path: misc-cli/bat/config

- shell:
  - [git submodule update --init --recursive, Installing submodules]
